name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      configuration: Release
      version-suffix: preview
      artifact-label: ${{ github.event_name == 'pull_request' && format('pr{0}', github.event.pull_request.number) || 'ci' }}
