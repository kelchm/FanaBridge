name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build and package without creating a GitHub Release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      configuration: Release
      version-suffix: ''
      artifact-label: ''

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: staging/

      - name: Verify tag matches artifact version
        # Only meaningful on tag-triggered runs; skip on manual workflow_dispatch (no tag available).
        if: github.event_name != 'workflow_dispatch'
        run: |
          artifact_name="${{ needs.build.outputs.artifact-name }}"
          # Extract version from artifact name: FanaBridge-0.1.0 -> 0.1.0
          artifact_version="${artifact_name#FanaBridge-}"
          # Expected version is the tag without the leading 'v'
          tag_version="${{ github.ref_name }}"
          tag_version="${tag_version#v}"
          if [[ "$artifact_version" != "$tag_version" ]]; then
            echo "::error::Tag '${{ github.ref_name }}' does not match artifact version '$artifact_version'. Update VersionPrefix in Directory.Build.props first."
            exit 1
          fi
          echo "Version check passed: $artifact_version"

      - name: Create release zip
        run: |
          artifact_name="${{ needs.build.outputs.artifact-name }}"
          mkdir -p dist
          cd staging
          zip -r "../dist/${artifact_name}.zip" .
          echo "Created dist/${artifact_name}.zip"
          ls -lh "../dist/${artifact_name}.zip"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/*.zip \
            --title "FanaBridge ${{ github.ref_name }}" \
            --generate-notes
